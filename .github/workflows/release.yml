name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    uses: yasyf/homebrew-tap/.github/workflows/release-go.yml@4afbb78f9e1814af04f9686ccf101ecafd5aa295
    secrets: inherit
    with:
      # cgo (libghostty-vt) → native clang for darwin + zig for static linux, so the
      # release runs on macOS and signs with codesign+notarytool (not quill).
      runner: macos-latest
      signer: codesign
      pre-build: |
        brew install zig@0.15 cmake
        echo "$(brew --prefix zig@0.15)/bin" >> "$GITHUB_PATH"
        echo "LIBGHOSTTY_ROOT=$GITHUB_WORKSPACE/.libghostty" >> "$GITHUB_ENV"
        echo "GOTOOLCHAIN=auto" >> "$GITHUB_ENV"
